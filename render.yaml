services:
  # 1. Backend Flask API Web Service
  - type: web
    name: clinix-pms-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/seed.py
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clinix-pms-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_FOLDER
        value: ./uploads

  # 2. Frontend React static site web service
  - type: web
    name: clinix-pms-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html


databases:
  # 3. Dedicated Render PostgreSQL Database
  - name: clinix-pms-postgres
    databaseName: clinix_db
    user: clinix_admin
    plan: free
